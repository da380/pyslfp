version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"  
  apt_packages:
    - libgeos-dev
    - libproj-dev
  jobs:
    post_create_environment:
      - pip install poetry
    post_install:
      - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH poetry install --with dev
      - sphinx-apidoc -f -o docs/source/ pyslfp/

sphinx:
  configuration: docs/source/conf.py

